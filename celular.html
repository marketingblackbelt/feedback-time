<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Feedback — Time</title>
<link rel="manifest" href="manifest-celular.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Feedback">
<meta name="theme-color" content="#185FA5">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='40' fill='%23185FA5'/><path d='M96 52a20 20 0 0 1 20 20v30a20 20 0 0 1-40 0V72a20 20 0 0 1 20-20z' fill='white'/><path d='M66 100v6a30 30 0 0 0 60 0v-6M96 136v16M80 152h32' stroke='white' stroke-width='8' stroke-linecap='round' fill='none'/></svg>">
<style>
  :root {
    --blue:#185FA5;--blue-light:#E6F1FB;--blue-mid:#378ADD;--blue-dark:#0C447C;
    --teal:#0F6E56;--teal-light:#E1F5EE;
    --amber:#854F0B;--amber-light:#FAEEDA;
    --green-light:#EAF3DE;--green-dark:#27500A;--green-mid:#97C459;
    --red:#A32D2D;--red-light:#FCEBEB;--red-border:#F09595;
    --text:#1a1a1a;--text2:#666;--text3:#999;
    --border:rgba(0,0,0,.12);--bg:#f5f5f3;--card:#fff;
    --radius:14px;--radius-sm:9px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);min-height:100vh}
  .header{padding:52px 20px 14px;background:var(--card);border-bottom:0.5px solid var(--border)}
  .header h1{font-size:20px;font-weight:600}
  .header-sub{font-size:12px;color:var(--text3);margin-top:3px}
  .tabs{display:flex;border-bottom:0.5px solid var(--border);background:var(--card)}
  .tab{flex:1;padding:12px;font-size:13px;font-weight:500;text-align:center;cursor:pointer;color:var(--text2);border:none;background:none;border-bottom:2px solid transparent}
  .tab.active{color:var(--blue);border-bottom-color:var(--blue)}
  .section{padding:16px 20px}
  .section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
  .sector-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;padding:4px 0 6px;margin-top:4px}
  .people-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
  .person-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:border-color .15s}
  .person-card.active{border-color:var(--blue-mid);background:var(--blue-light)}
  .person-card.inactive{opacity:.5;pointer-events:none}
  .avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
  .av-s{background:#E6F1FB;color:#0C447C}
  .av-c{background:#E1F5EE;color:#085041}
  .av-n{background:#FAEEDA;color:#633806}
  .person-info .pname{font-size:13px;font-weight:500;line-height:1.2}
  .person-info .prole{font-size:10px;color:var(--text2)}
  .rec-card{background:var(--card);border-radius:var(--radius);border:0.5px solid var(--border);padding:20px;text-align:center;margin-bottom:12px}
  .rec-for{font-size:13px;color:var(--text2);margin-bottom:16px;min-height:20px}
  .rec-for span{color:var(--blue);font-weight:600}
  .mic-area{display:flex;flex-direction:column;align-items:center;gap:12px}
  .timer{font-size:30px;font-weight:300;letter-spacing:.04em;font-variant-numeric:tabular-nums;min-height:38px}
  .wave{display:flex;align-items:center;justify-content:center;gap:3px;height:24px}
  .wave-bar{width:3px;border-radius:2px;background:var(--blue-mid);transition:height .1s}
  .mic-btn{width:80px;height:80px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
  .mic-btn svg{width:32px;height:32px}
  .mic-btn.rec{background:var(--red-light);border-color:var(--red-border);animation:pulse 1.1s infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  .rec-status{font-size:13px;color:var(--text2)}
  .rec-status.active{color:var(--red);font-weight:500}
  .transcript-box{background:var(--bg);border-radius:var(--radius-sm);padding:12px 14px;margin-top:12px;text-align:left;min-height:64px;position:relative}
  .transcript-box .tlbl{font-size:10px;color:var(--text3);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
  .transcript-box .ttext{font-size:14px;color:var(--text);line-height:1.55}
  .transcript-box .ttext.ph{color:var(--text3);font-style:italic}
  .ai-badge{font-size:10px;background:var(--blue-light);color:var(--blue-dark);padding:2px 6px;border-radius:20px;font-weight:600}
  .ai-processing{font-size:12px;color:var(--blue);margin-top:6px;display:none}
  .type-pills{display:flex;gap:6px;margin-top:14px;justify-content:center;flex-wrap:wrap}
  .pill{padding:7px 13px;border-radius:20px;font-size:13px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;font-weight:500}
  .pill.p-pos.sel{background:#EAF3DE;border-color:var(--green-mid);color:var(--green-dark)}
  .pill.p-dev.sel{background:var(--amber-light);border-color:#EF9F27;color:var(--amber)}
  .pill.p-met.sel{background:var(--blue-light);border-color:var(--blue-mid);color:var(--blue)}
  .save-btn{display:block;width:100%;padding:14px;border-radius:var(--radius-sm);background:var(--blue);color:#fff;font-size:15px;font-weight:600;border:none;cursor:pointer;margin-top:14px;transition:opacity .2s}
  .save-btn:disabled{opacity:.3;cursor:not-allowed}
  .team-list{display:flex;flex-direction:column;gap:6px}
  .team-item{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;gap:10px}
  .team-item .tinfo{flex:1}
  .team-item .tname{font-size:14px;font-weight:500}
  .team-item .trole{font-size:12px;color:var(--text2)}
  .badge-sm{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;margin-left:6px}
  .b-new{background:var(--amber-light);color:var(--amber)}
  .b-lic{background:var(--red-light);color:var(--red)}
  .b-col{background:var(--teal-light);color:var(--teal)}
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:20px;font-size:14px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:99}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.err{background:var(--red)}
  .add-form{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:12px}
  .add-form input,.add-form select{width:100%;margin-bottom:10px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--bg)}
  .add-form .add-btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer}
  .edit-form{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-top:8px}
  .edit-form input,.edit-form select{width:100%;margin-bottom:8px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--card)}
  .edit-form .edit-row{display:flex;gap:8px}
  .edit-form .edit-row button{flex:1;padding:10px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;border:none;cursor:pointer}
  .btn-confirm{background:var(--blue);color:#fff}
  .btn-cancel{background:var(--bg);color:var(--text2);border:1px solid var(--border) !important}
  .edit-note{font-size:11px;color:var(--text3);margin-bottom:6px}
  .team-actions{display:flex;gap:4px;align-items:center;flex-shrink:0}
  .icon-btn{background:none;border:none;cursor:pointer;padding:5px;color:var(--text3);font-size:15px;line-height:1}
</style>
</head>
<body>
<div class="header">
  <h1>Registrar feedback</h1>
  <div class="header-sub" id="headerSub">Time · Marketing & CS</div>
</div>
<div id="installBanner" style="display:none;background:#E6F1FB;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;border-bottom:0.5px solid rgba(0,0,0,.1)">
  <div style="display:flex;align-items:center;gap:8px">
    <span style="font-size:20px">📲</span>
    <span style="font-size:13px;color:#0C447C;font-weight:500">Adicionar à tela inicial</span>
  </div>
  <button id="installBtn" style="background:#185FA5;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer">Instalar</button>
</div>
<div class="tabs">
  <button class="tab active" onclick="showTab('gravar')">Gravar</button>
  <button class="tab" onclick="showTab('equipe')">Equipe</button>
</div>

<div id="tabGravar">
  <div class="section">
    <div class="section-title">Selecione a pessoa</div>
    <div id="sectorMkt">
      <div class="sector-label">Marketing</div>
      <div class="people-grid" id="gridMkt"></div>
    </div>
    <div id="sectorCs" style="margin-top:8px">
      <div class="sector-label">CS</div>
      <div class="people-grid" id="gridCs"></div>
    </div>
  </div>
  <div class="section" style="padding-top:0">
    <div class="rec-card">
      <div class="rec-for" id="recFor">Nenhuma pessoa selecionada</div>
      <div class="mic-area">
        <div class="timer" id="timer">0:00</div>
        <div class="wave" id="wave"></div>
        <button class="mic-btn" id="micBtn" onclick="toggleRec()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
            <path d="M19 10v1a7 7 0 0 1-14 0v-1M12 18.5v3M8.5 21.5h7"/>
          </svg>
        </button>
        <div class="rec-status" id="recStatus">Toque para gravar</div>
      </div>
      <div class="transcript-box">
        <div class="tlbl">
          <span>Transcrição</span>
          <span class="ai-badge">IA · Haiku</span>
        </div>
        <div class="ttext ph" id="transcriptTxt">Fale após tocar no microfone...</div>
        <div class="ai-processing" id="aiProcessing">Organizando com IA...</div>
      </div>
      <div class="type-pills">
        <button class="pill p-pos sel" id="pp-pos" onclick="setType('pos')">Positivo</button>
        <button class="pill p-dev" id="pp-dev" onclick="setType('dev')">Desenvolvimento</button>
        <button class="pill p-met" id="pp-met" onclick="setType('met')">Reunião</button>
      </div>
      <button class="save-btn" id="saveBtn" onclick="saveFeed()" disabled>Salvar no Drive</button>
    </div>
  </div>
</div>

<div id="tabEquipe" style="display:none">
  <div class="section">
    <div class="section-title">Time atual</div>
    <div class="team-list" id="teamList"></div>
    <div style="margin-top:14px">
      <button class="save-btn" style="background:var(--bg);color:var(--blue);border:1.5px solid var(--blue-mid)" onclick="toggleAddForm()">+ Adicionar pessoa</button>
    </div>
    <div class="add-form" id="addForm" style="display:none">
      <input type="text" id="newName" placeholder="Nome completo">
      <input type="text" id="newRole" placeholder="Cargo">
      <select id="newType">
        <option value="s">Supervisor(a)</option>
        <option value="c">Colaborador(a) estratégico</option>
        <option value="n">Em integração (em breve)</option>
      </select>
      <select id="newSector">
        <option value="mkt">Marketing</option>
        <option value="cs">CS</option>
      </select>
      <button class="add-btn" onclick="addPerson()">Adicionar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DRIVE_FILE = 'feedbacks-time.json';
const TEAM_FILE  = 'equipe-time.json';
const CLIENT_ID  = '124671268662-c8m7g0f3620buuv8e589t5f4aenk71v1.apps.googleusercontent.com';
const SCOPES     = 'https://www.googleapis.com/auth/drive.file';

let accessToken = null, selPerson = null, feedType = 'pos';
let isRec = false, recog = null, rawTranscript = '', cleanTranscript = '';
let timerInt = null, wavInt = null, secs = 0;

const defaultTeam = [
  {id:1, name:'Victor',       role:'Supervisor',              type:'s', sector:'mkt', active:true},
  {id:2, name:'João Victor',  role:'Supervisor',              type:'n', sector:'mkt', active:true},
  {id:3, name:'Cleber',       role:'Diretor de Arte',         type:'c', sector:'mkt', active:true},
  {id:4, name:'Joseline',     role:'Supervisora',             type:'s', sector:'cs',  active:true},
  {id:5, name:'Esther',       role:'Supervisora',             type:'s', sector:'cs',  active:true, note:'licença maternidade em breve'},
  {id:6, name:'Ellen',        role:'Supervisora',             type:'n', sector:'cs',  active:true},
  {id:7, name:'Verônica',     role:'Analista Estratégica',    type:'c', sector:'cs',  active:true},
  {id:8, name:'Maria Beatriz',role:'Analista Estratégica Sênior', type:'c', sector:'cs', active:true},
];

let team = JSON.parse(localStorage.getItem('equipe') || 'null') || defaultTeam;

function initials(n){ return n.split(' ').slice(0,2).map(x=>x[0].toUpperCase()).join(''); }
function avClass(t){ return t==='c'?'av-c':t==='n'?'av-n':'av-s'; }

function renderPeople(){
  const mkt = team.filter(p=>p.sector==='mkt'&&p.active!==false);
  const cs  = team.filter(p=>p.sector==='cs' &&p.active!==false);
  document.getElementById('gridMkt').innerHTML = mkt.map(p=>`
    <div class="person-card" id="pc${p.id}" onclick="selectPerson(${p.id})">
      <div class="avatar ${avClass(p.type)}">${initials(p.name)}</div>
      <div class="person-info">
        <div class="pname">${p.name}</div>
        <div class="prole">${p.role}</div>
      </div>
    </div>`).join('');
  document.getElementById('gridCs').innerHTML = cs.map(p=>`
    <div class="person-card" id="pc${p.id}" onclick="selectPerson(${p.id})">
      <div class="avatar ${avClass(p.type)}">${initials(p.name)}</div>
      <div class="person-info">
        <div class="pname">${p.name}</div>
        <div class="prole">${p.role}</div>
      </div>
    </div>`).join('');
}

function badgeHtml(p){
  if(p.tag) return `<span class="badge-sm" style="background:var(--bg);color:var(--text2);border:0.5px solid var(--border)">${p.tag}</span>`;
  if(p.note && p.note.includes('licença')) return `<span class="badge-sm b-lic">licença</span>`;
  if(p.type==='n') return `<span class="badge-sm b-new">em breve</span>`;
  if(p.type==='c') return `<span class="badge-sm b-col">estratégico</span>`;
  return '';
}

function renderTeamList(){
  const sectors = [{key:'mkt',label:'Marketing'},{key:'cs',label:'CS'}];
  let html = '';
  sectors.forEach(s=>{
    const members = team.filter(p=>p.sector===s.key);
    html += `<div class="sector-label">${s.label}</div>`;
    members.forEach(p=>{
      const inactive = p.active===false ? ' style="opacity:.45"' : '';
      html += `<div id="ti${p.id}">
        <div class="team-item"${inactive}>
          <div class="avatar ${avClass(p.type)}">${initials(p.name)}</div>
          <div class="tinfo">
            <div class="tname">${p.name}${badgeHtml(p)}</div>
            <div class="trole">${p.role}</div>
          </div>
          <div class="team-actions">
            <button class="icon-btn" onclick="toggleEdit(${p.id})" title="Editar">✎</button>
            ${p.active!==false
              ? `<button class="icon-btn" onclick="deactivate(${p.id})" title="Desativar" style="font-size:18px">×</button>`
              : `<button class="icon-btn" onclick="reactivate(${p.id})" style="color:var(--blue);font-size:12px">reativar</button>`}
          </div>
        </div>
        <div id="ef${p.id}" class="edit-form" style="display:none">
          <div class="edit-note">Editando: <strong>${p.name}</strong></div>
          <input type="text" id="en${p.id}" value="${p.name}" placeholder="Nome">
          <input type="text" id="er${p.id}" value="${p.role}" placeholder="Cargo">
          <select id="et${p.id}">
            <option value="s"${p.type==='s'?' selected':''}>Supervisor(a)</option>
            <option value="c"${p.type==='c'?' selected':''}>Colaborador(a) estratégico</option>
            <option value="n"${p.type==='n'?' selected':''}>Em integração (em breve)</option>
          </select>
          <select id="es${p.id}">
            <option value="mkt"${p.sector==='mkt'?' selected':''}>Marketing</option>
            <option value="cs"${p.sector==='cs'?' selected':''}>CS</option>
          </select>
            <input type="text" id="enote${p.id}" value="${p.tag||''}" placeholder="Tag livre: licença, sênior, promovido..." style="font-size:12px">
          <div class="edit-row">
            <button class="btn-confirm" onclick="saveEdit(${p.id})">Salvar</button>
            <button class="btn-cancel" onclick="toggleEdit(${p.id})">Cancelar</button>
          </div>
        </div>
      </div>`;
    });
  });
  document.getElementById('teamList').innerHTML = html;
}

function toggleEdit(id){
  const ef = document.getElementById('ef'+id);
  ef.style.display = ef.style.display==='none' ? 'block' : 'none';
}

function saveEdit(id){
  const p = team.find(x=>x.id===id);
  p.name   = document.getElementById('en'+id).value.trim() || p.name;
  p.role   = document.getElementById('er'+id).value.trim() || p.role;
  p.type   = document.getElementById('et'+id).value;
  p.sector = document.getElementById('es'+id).value;
  const tag = document.getElementById('enote'+id).value.trim();
  if(tag) p.tag = tag; else delete p.tag;
  localStorage.setItem('equipe',JSON.stringify(team));
  renderPeople(); renderTeamList();
  showToast(p.name+' atualizado(a)!');
}

function selectPerson(id){
  selPerson = team.find(p=>p.id===id);
  document.querySelectorAll('.person-card').forEach(c=>c.classList.remove('active'));
  const el = document.getElementById('pc'+id);
  if(el) el.classList.add('active');
  document.getElementById('recFor').innerHTML = `Para: <span>${selPerson.name}</span>`;
}

function setType(t){
  feedType = t;
  ['pos','dev','met'].forEach(x=>{
    document.getElementById('pp-'+x).className = `pill p-${x}${t===x?' sel':''}`;
  });
}

function showTab(t){
  document.getElementById('tabGravar').style.display = t==='gravar'?'block':'none';
  document.getElementById('tabEquipe').style.display = t==='equipe'?'block':'none';
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',(t==='gravar'&&i===0)||(t==='equipe'&&i===1)));
  if(t==='equipe') renderTeamList();
}

function toggleAddForm(){
  const f = document.getElementById('addForm');
  f.style.display = f.style.display==='none'?'block':'none';
}

function addPerson(){
  const name = document.getElementById('newName').value.trim();
  const role = document.getElementById('newRole').value.trim();
  const type = document.getElementById('newType').value;
  const sector = document.getElementById('newSector').value;
  if(!name||!role){showToast('Preencha nome e cargo',true);return;}
  const newId = Math.max(...team.map(p=>p.id))+1;
  team.push({id:newId,name,role,type,sector,active:true});
  localStorage.setItem('equipe',JSON.stringify(team));
  renderPeople(); renderTeamList();
  document.getElementById('newName').value='';
  document.getElementById('newRole').value='';
  document.getElementById('addForm').style.display='none';
  showToast(name+' adicionado(a)!');
}

function deactivate(id){
  const p = team.find(x=>x.id===id);
  if(p){ p.active=false; localStorage.setItem('equipe',JSON.stringify(team)); renderPeople(); renderTeamList(); showToast(p.name+' desativado(a)'); }
}
function reactivate(id){
  const p = team.find(x=>x.id===id);
  if(p){ p.active=true; localStorage.setItem('equipe',JSON.stringify(team)); renderPeople(); renderTeamList(); showToast(p.name+' reativado(a)'); }
}

function toggleRec(){
  if(!selPerson){showToast('Selecione uma pessoa primeiro',true);return;}
  if(!isRec) startRec(); else stopRec();
}

function startRec(){
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showToast('Use Chrome para gravar',true);return;}
  rawTranscript=''; cleanTranscript='';
  recog = new SR();
  recog.lang='pt-BR'; recog.continuous=true; recog.interimResults=true;
  recog.onresult = e=>{
    let t='';
    for(let i=0;i<e.results.length;i++) t+=e.results[i][0].transcript+' ';
    rawTranscript = t.trim();
    const el=document.getElementById('transcriptTxt');
    el.textContent=rawTranscript; el.classList.remove('ph');
  };
  recog.onerror=()=>stopRec();
  recog.start();
  isRec=true;
  document.getElementById('micBtn').classList.add('rec');
  document.getElementById('recStatus').textContent='Gravando...';
  document.getElementById('recStatus').className='rec-status active';
  secs=0;
  timerInt=setInterval(()=>{secs++;const m=Math.floor(secs/60),s=secs%60;document.getElementById('timer').textContent=m+':'+(s<10?'0':'')+s;},1000);
  wavInt=setInterval(()=>{document.querySelectorAll('.wave-bar').forEach(b=>{b.style.height=Math.round(4+Math.random()*20)+'px';});},110);
}

async function stopRec(){
  if(recog){recog.stop();recog=null;}
  isRec=false;
  clearInterval(timerInt);clearInterval(wavInt);
  document.getElementById('micBtn').classList.remove('rec');
  document.getElementById('recStatus').className='rec-status';
  document.querySelectorAll('.wave-bar').forEach(b=>b.style.height='4px');
  if(rawTranscript){
    document.getElementById('recStatus').textContent='Organizando com IA...';
    document.getElementById('aiProcessing').style.display='block';
    cleanTranscript = await cleanWithAI(rawTranscript);
    document.getElementById('transcriptTxt').textContent = cleanTranscript;
    document.getElementById('aiProcessing').style.display='none';
    document.getElementById('recStatus').textContent='Pronto para salvar';
    document.getElementById('saveBtn').disabled=false;
  } else {
    document.getElementById('recStatus').textContent='Toque para gravar';
  }
}

async function cleanWithAI(raw){
  try{
    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-haiku-4-5',
        max_tokens:400,
        messages:[{role:'user',content:`Você é um assistente que organiza notas de feedback de gestores de equipe.

Texto falado bruto (pode ter repetições, vícios de linguagem, "né", "ãã", frases incompletas):
"${raw}"

Reescreva como uma nota de feedback clara, objetiva e profissional em 1-3 frases. Mantenha o conteúdo e o tom. Não adicione informações. Retorne APENAS a nota reorganizada, sem explicações.`}]
      })
    });
    const data = await resp.json();
    return data.content?.[0]?.text?.trim() || raw;
  }catch(e){
    return raw;
  }
}

async function saveFeed(){
  if(!cleanTranscript&&!rawTranscript||!selPerson)return;
  const btn=document.getElementById('saveBtn');
  btn.disabled=true;btn.textContent='Salvando...';
  const now=new Date();
  const entry={
    id:Date.now(),
    person:selPerson.name,
    personId:selPerson.id,
    sector:selPerson.sector,
    type:feedType,
    text:cleanTranscript||rawTranscript,
    date:now.toLocaleDateString('pt-BR'),
    datetime:now.toISOString()
  };
  const saved = JSON.parse(localStorage.getItem('feedbacks')||'[]');
  saved.unshift(entry);
  localStorage.setItem('feedbacks',JSON.stringify(saved));
  showToast('Salvo!');
  rawTranscript='';cleanTranscript='';
  document.getElementById('transcriptTxt').textContent='Fale após tocar no microfone...';
  document.getElementById('transcriptTxt').classList.add('ph');
  document.getElementById('timer').textContent='0:00';secs=0;
  btn.disabled=true;btn.textContent='Salvar no Drive';
}

function showToast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(err?' err':'');
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);
}

let deferredPrompt;
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("installBanner").style.display = "flex";
});
document.getElementById("installBtn") && document.getElementById("installBtn").addEventListener("click", () => {
  if(deferredPrompt){ deferredPrompt.prompt(); deferredPrompt.userChoice.then(()=>{ document.getElementById("installBanner").style.display="none"; deferredPrompt=null; }); }
});
window.onload=()=>{
  renderPeople();
  const wave=document.getElementById('wave');
  for(let i=0;i<12;i++){const b=document.createElement('div');b.className='wave-bar';b.style.height='4px';wave.appendChild(b);}
};
